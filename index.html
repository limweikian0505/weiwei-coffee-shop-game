<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 关键：阻止手机缩放，适配刘海屏 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / 全屏模式 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FFF8F0" />
  <!-- Force landscape orientation -->
  <meta name="screen-orientation" content="landscape" />

  <title>微微咖啡馆 ☕</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FFF8F0;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      /* 阻止手机的下拉刷新和橡皮筋效果 */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      touch-action: none;
    }

    #gameCanvas {
      display: block;
      /* 占满安全区域（考虑刘海屏） */
      width: 100%;
      height: 100%;
      /* 手机上阻止长按出现菜单 */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      cursor: pointer;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #FFF8F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
    }
    #loading h1 {
      font-size: clamp(1.5rem, 6vw, 2.4rem);
      color: #8B4513;
    }
    #loading p {
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: #A0724A;
    }
    #loading.hidden { display: none; }

    /* Portrait warning overlay */
    #portrait-warning {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(61, 31, 0, 0.95);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #FFD700;
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      padding: 20px;
    }
    #portrait-warning h2 {
      font-size: clamp(1.2rem, 5vw, 1.8rem);
    }
    #portrait-warning p {
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      color: #FFD180;
    }
    @media (orientation: portrait) {
      #portrait-warning { display: flex; }
    }
  </style>
</head>
<body>

  <!-- Portrait warning overlay -->
  <div id="portrait-warning">
    <h2>📱 请旋转屏幕</h2>
    <p>微微咖啡馆在横屏模式下游玩</p>
    <p>Please rotate your device to landscape</p>
  </div>

  <!-- Loading screen -->
  <div id="loading">
    <h1>微微咖啡馆 ☕</h1>
    <p>Loading… 正在加载中…</p>
  </div>

  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Entry point — all modules loaded transitively from Game.js -->
  <script type="module" src="src/core/Game.js"></script>

  <!-- Hide loading screen once the module finishes loading -->
  <script type="module">
    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        const loader = document.getElementById('loading');
        if (loader) loader.classList.add('hidden');
      });
    });

    // 阻止手机双指缩放
    document.addEventListener('gesturestart',  e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend',    e => e.preventDefault());

    // 阻止手机下拉刷新（多点触控）
    document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  </script>

</body>
</html>
